<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#9b0d0d" />
    <meta name="description" content="Missile Calm - התרעות צבע אדום עם הבדלה בין טילים לכלי טיס" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <title>Missile Calm</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="badge">PWA בזמן אמת</p>
        <h1>Missile Calm</h1>
        <p class="subtitle">התרעות פיקוד העורף עם קול שונה לטיל ולכלי טיס</p>
      </header>

      <section class="controls">
        <button id="enable-notifications" class="btn primary">אשר התראות</button>
        <button id="enable-audio" class="btn">אשר שמע</button>
        <button id="test-local-sound" class="btn">בדיקת סאונד מקומית</button>
        <button id="test-missile" class="btn ghost">בדיקת טיל</button>
        <button id="test-aircraft" class="btn ghost">בדיקת כלי טיס</button>
        <button id="test-prelaunch" class="btn ghost">בדיקת התראה מוקדמת</button>
        <button id="test-allclear" class="btn ghost">בדיקת סיום אירוע</button>
      </section>

      <section class="settings-panel">
        <h2>הגדרות עיר ואזורים</h2>
        <div class="settings-grid">
          <label class="field">
            <span>עיר ראשית</span>
            <select id="city-select" class="input">
              <option value="">ללא עיר קבועה</option>
              <option value="תל אביב">תל אביב</option>
              <option value="ירושלים">ירושלים</option>
              <option value="חיפה">חיפה</option>
              <option value="באר שבע">באר שבע</option>
              <option value="אשדוד">אשדוד</option>
              <option value="אשקלון">אשקלון</option>
              <option value="שדרות">שדרות</option>
              <option value="נהריה">נהריה</option>
            </select>
          </label>

          <label class="field">
            <span>אזורים נוספים (פסיק בין ערכים)</span>
            <input id="areas-input" class="input" type="text" placeholder="לדוגמה: גוש דן, מרכז, השרון" />
          </label>

          <label class="check-field">
            <input id="filter-enabled" type="checkbox" checked />
            <span>הפעל סינון לפי עיר/אזורים</span>
          </label>

          <label class="check-field">
            <input id="voice-enabled" type="checkbox" checked />
            <span>הפעל הקראה קולית</span>
          </label>

          <button id="save-settings" class="btn">שמור הגדרות</button>
          <p id="settings-state" class="settings-state">טרם נשמרו הגדרות.</p>
        </div>
      </section>

      <section class="status-grid">
        <article>
          <h2>מצב חיבור</h2>
          <p id="connection-state">מתחבר...</p>
        </article>
        <article>
          <h2>התראה אחרונה</h2>
          <p id="last-alert">עדיין אין</p>
        </article>
        <article>
          <h2>דיבאג</h2>
          <p id="debug-state">ממתין לפעולה...</p>
        </article>
      </section>

      <section class="feed-wrap">
        <h2>יומן התרעות</h2>
        <ul id="alerts-feed" class="alerts-feed"></ul>
      </section>
    </main>

    <aside id="live-popup" class="live-popup" aria-live="assertive" aria-hidden="true">
      <div class="popup-card">
        <p id="popup-type" class="popup-type"></p>
        <h3 id="popup-message"></h3>
        <p id="popup-areas" class="popup-areas"></p>
      </div>
    </aside>

    <script src="./config.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
