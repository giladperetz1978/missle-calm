<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#9b0d0d" />
    <meta name="description" content="Missile Calm - התרעות צבע אדום עם הבדלה בין טילים לכלי טיס" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml" />
    <title>Missile Calm</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="badge">PWA בזמן אמת</p>
        <h1>Missile Calm</h1>
        <p class="subtitle">התרעות פיקוד העורף עם קול שונה לטיל ולכלי טיס</p>
      </header>

      <section class="controls">
        <button id="enable-notifications" class="btn primary">אשר התראות</button>
        <button id="enable-audio" class="btn">אשר שמע</button>
        <button id="test-missile" class="btn ghost">בדיקת טיל</button>
        <button id="test-aircraft" class="btn ghost">בדיקת כלי טיס</button>
        <button id="test-prelaunch" class="btn ghost">בדיקת התראה מוקדמת</button>
        <button id="test-allclear" class="btn ghost">בדיקת סיום אירוע</button>
      </section>

      <section class="status-grid">
        <article>
          <h2>מצב חיבור</h2>
          <p id="connection-state">מתחבר...</p>
        </article>
        <article>
          <h2>התראה אחרונה</h2>
          <p id="last-alert">עדיין אין</p>
        </article>
        <article>
          <h2>דיבאג</h2>
          <p id="debug-state">ממתין לפעולה...</p>
        </article>
      </section>

      <section class="feed-wrap">
        <h2>יומן התרעות</h2>
        <ul id="alerts-feed" class="alerts-feed"></ul>
      </section>
    </main>

    <aside id="live-popup" class="live-popup" aria-live="assertive" aria-hidden="true">
      <div class="popup-card">
        <p id="popup-type" class="popup-type"></p>
        <h3 id="popup-message"></h3>
        <p id="popup-areas" class="popup-areas"></p>
      </div>
    </aside>

    <script src="./config.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
