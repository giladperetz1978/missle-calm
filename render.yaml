services:
  - type: web
    name: missile-calm
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: POLL_INTERVAL_MS
        value: 2500
      - key: CORS_ORIGIN
        value: https://giladperetz1978.github.io
      - key: ALERT_SOURCE_URL
        value: https://www.oref.org.il/WarningMessages/alert/alerts.json
      - key: VAPID_SUBJECT
        value: mailto:alerts@example.com
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
